<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>La PicoMobile</title>
    <link rel="stylesheet" href="style.css?v=20260621-1">
</head>
<body>

<h1>La PicoMobile</h1>

<div class="controller">

    <div class=admin>
        <button data-action="toggle-led">Toggle LED</button>
        <button data-action="quit">Reset Pico</button>
    </div>

    <div class=cam>
        <img id=cam-img>
        <button id=cam-toggle></button>
    </div>

    <div class="driving">
        <button data-action="forward">↑</button>
        <div class="steering">
            <button data-action="left">←</button>
            <button data-action="right">→</button>
        </div>
        <button data-action="backward">↓</button>
    </div>

</div>

<script src="app.js?v=20260621-3"></script>

</body>
</html>
