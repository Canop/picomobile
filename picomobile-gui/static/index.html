<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>La PicoMobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>La PicoMobile</h1>

<div class="controller">
    <button data-action="forward">Forward ↑</button>

    <div class="steering">
        <button data-action="left">← Left</button>
        <button data-action="right">Right →</button>
    </div>

    <button data-action="backward">Backward ↓</button>
    <button data-action="toggle-led">Toggle LED</button>
</div>

<script src="app.js"></script>

</body>
</html>
