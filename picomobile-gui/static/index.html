<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>La Picomobile</title>
    <link rel="stylesheet" href="style.css?v=20260622-2">
</head>
<body>

<h1>La Picomobile</h1>

<div class="controller">

    <div class=admin>
        <button data-action="toggle-led">Toggle LED</button>
        <button data-action="quit">Reset Pico</button>
    </div>


    <div class=cam>
        <img id=cam-img>
        <button id=cam-toggle></button>
        <div id="motion-config">
            <h3>Motion detection</h3>
            <label><input type="checkbox" id="enable-motion"> Enable</label>
            <label><input type="checkbox" id="sound-on-motion"> Sound</label>
            <label><input type="checkbox" id="save-motion-events"> Save Events</label>
            <button id="motion-config-save">Apply</button>
            <span id="motion-config-status"></span>
        </div>
    </div>

    <div class="driving">
        <button data-action="forward">↑</button>
        <div class="steering">
            <button data-action="left">←</button>
            <button data-action="right">→</button>
        </div>
        <button data-action="backward">↓</button>
    </div>

</div>

<script src="app.js?v=20260622-2"></script>

</body>
</html>
